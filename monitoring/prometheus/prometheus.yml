global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: ebis-nacionalidad-ledger
    environment: local-demo

scrape_configs:
  - job_name: besu
    metrics_path: /metrics
    static_configs:
      - targets:
          - validator1:9545
        labels:
          node: validator1
          role: validator
      - targets:
          - validator2:9545
        labels:
          node: validator2
          role: validator
      - targets:
          - validator3:9545
        labels:
          node: validator3
          role: validator
      - targets:
          - validator4:9545
        labels:
          node: validator4
          role: validator
      - targets:
          - rpcnode:9545
        labels:
          node: rpcnode
          role: rpc

  - job_name: api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api:8080
        labels:
          service: spring-api

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:9464
        labels:
          service: otel-collector
