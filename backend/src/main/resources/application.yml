spring:
  application:
    name: ebis-nacionalidad-ledger-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

besu:
  rpc-url: ${BESU_LOCAL_RPC_URL:http://127.0.0.1:8545}

app:
  security:
    jwt:
      secret: ${API_JWT_SECRET}
      ttl-minutes: 15
    cors:
      allowed-origins: ${API_ALLOWED_ORIGINS:http://localhost:5173}
  contracts:
    manifest-path: ${CONTRACTS_MANIFEST_PATH:../generated/deployments/besuLocal.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
