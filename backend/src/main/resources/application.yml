spring:
  application:
    name: ebis-nacionalidad-ledger-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

besu:
  rpc-url: ${BESU_LOCAL_RPC_URL:http://127.0.0.1:8545}

app:
  security:
    jwt:
      secret: ${API_JWT_SECRET}
      ttl-minutes: 15
    siwe:
      domain: ${SIWE_DOMAIN:localhost}
      uri: ${SIWE_URI:http://localhost:5173}
      chain-id: ${SIWE_CHAIN_ID:20260711}
      challenge-ttl-minutes: 5
    cors:
      allowed-origins: ${API_ALLOWED_ORIGINS:http://localhost:5173}
  contracts:
    manifest-path: ${CONTRACTS_MANIFEST_PATH:../generated/deployments/besuLocal.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
